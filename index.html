<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>AI Chat + Študenti</title>

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #f0f2f5;
        }

        #studenti-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 180px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        #chat-box {
            width: 60%;
            margin: 20px auto;
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            background: white;
            padding: 10px;
            text-align: left;
        }

        #chat-input {
            width: 50%;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        select {
            padding: 8px;
            margin: 10px;
        }
    </style>
</head>

<body>

    <h1>AI Chatbot + Študenti 🤖</h1>

    <h2>Študenti</h2>

    <!-- SORTING BONUS -->
    <select id="sortSelect">
        <option value="name_asc">Meno A-Z</option>
        <option value="age_asc">Vek ↑ (najmladší)</option>
        <option value="age_desc">Vek ↓ (najstarší)</option>
    </select>

    <div id="studenti-container">Načítavam...</div>

    <h2>Chat</h2>

    <div id="chat-box"></div>

    <input id="chat-input" placeholder="Napíš správu...">
    <button onclick="sendMessage()">Odoslať</button>

    <script src="script.js"></script>

</body>
</html>
